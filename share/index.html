<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Workout — IronZ</title>

<!-- Open Graph tags for iMessage / Slack / Twitter unfurls.
     These are generic because GitHub Pages can't server-render a per-
     workout title — the unfurl happens at fetch time and JS hasn't run
     yet. The workout details render client-side after the page loads. -->
<meta property="og:title" content="A workout shared from IronZ">
<meta property="og:description" content="Run this workout in your own zones with IronZ. Your friend's paces stay private.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ironz.fit/share">
<meta property="og:image" content="https://ironz.fit/Logo/iron-logo.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="A workout shared from IronZ">
<meta name="twitter:description" content="Run this workout in your own zones with IronZ.">
<meta name="twitter:image" content="https://ironz.fit/Logo/iron-logo.png">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f0f18;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container { max-width: 480px; margin: 0 auto; }

  /* Loading state */
  .loading { text-align: center; padding: 80px 0; }
  .loading .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(168,85,247,0.2);
    border-top-color: #a855f7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error state */
  .error-page { text-align: center; padding: 80px 0; }
  .error-page h1 { font-size: 24px; margin-bottom: 12px; color: #fff; }
  .error-page p { color: #999; font-size: 15px; }

  /* Card */
  .card {
    background: #1a1a2e;
    border-radius: 16px;
    border: 1px solid rgba(168,85,247,0.15);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .card-header {
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .card-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }
  .card-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 13px;
    color: #999;
  }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(168,85,247,0.15);
    color: #c084fc;
  }
  .shared-by {
    padding: 14px 20px;
    font-size: 14px;
    color: #bbb;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .shared-by strong { color: #fff; }

  /* Sections (exercises, segments, etc.) */
  .section {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #a855f7;
    margin-bottom: 10px;
  }
  .exercise-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 14px;
  }
  .exercise-name { color: #e0e0e0; flex: 1; }
  .exercise-detail { color: #999; font-size: 13px; text-align: right; margin-left: 12px; }

  /* Superset grouping */
  .superset-group {
    border-left: 3px solid #a855f7;
    padding-left: 12px;
    margin: 6px 0;
  }
  .superset-label {
    font-size: 11px;
    font-weight: 700;
    color: #a855f7;
    margin-bottom: 4px;
  }

  /* Notes */
  .notes {
    padding: 14px 20px;
    font-size: 13px;
    color: #999;
    font-style: italic;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  /* CTA */
  .cta {
    text-align: center;
    padding: 24px 0;
  }
  .cta a {
    display: inline-block;
    padding: 14px 32px;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    border-radius: 12px;
    text-decoration: none;
    transition: transform 0.15s;
  }
  .cta a:active { transform: scale(0.97); }
  .cta .sub { font-size: 12px; color: #777; margin-top: 8px; }

  /* Expired overlay */
  .expired-banner {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    margin-bottom: 16px;
    color: #f87171;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading-state">
    <div class="spinner"></div>
    <p>Loading workout...</p>
  </div>
</div>

<script>
(function() {
  // The share-preview Edge Function is the data source. It returns JSON
  // (Supabase forces text/plain on --no-verify-jwt responses, but fetch
  // .text() + JSON.parse works regardless of Content-Type).
  const EDGE_URL = "https://dagdpdcwqdlibxbitdgr.supabase.co/functions/v1/share-preview";

  const app = document.getElementById('app');

  // Extract token from ?token= (primary) or /w/TOKEN path fallback.
  let token = null;
  const params = new URLSearchParams(window.location.search);
  token = params.get('token');
  if (!token) {
    const pathMatch = window.location.pathname.match(/\/w\/([^\/]+)/);
    if (pathMatch) token = pathMatch[1];
  }

  if (!token || !/^[\w-]{6,64}$/.test(token)) {
    showError('Invalid share link', 'This link appears to be malformed.');
    return;
  }

  fetchWorkout(token);

  async function fetchWorkout(token) {
    try {
      // format=json tells the Edge Function to return JSON instead of
      // 302-redirecting back here. Accept header is a second signal for
      // belt-and-suspenders.
      const url = `${EDGE_URL}?format=json&token=${encodeURIComponent(token)}`;
      const res = await fetch(url, {
        headers: { 'Accept': 'application/json' },
      });

      // Supabase overrides content-type to text/plain — parse the body
      // text manually so content-type mismatch doesn't break .json().
      const bodyText = await res.text();
      let payload;
      try {
        payload = JSON.parse(bodyText);
      } catch (e) {
        console.error('[share] failed to parse edge response:', bodyText.slice(0, 500));
        showError('Something went wrong', 'Could not load this workout.');
        return;
      }

      if (!payload || !payload.ok) {
        const reason = (payload && payload.reason) || 'unknown';
        if (reason === 'expired') {
          showExpired({ share_token: payload.share_token || token });
          return;
        }
        if (reason === 'revoked') {
          showError('Link revoked', 'This share link is no longer available.');
          return;
        }
        if (reason === 'not_found' || reason === 'invalid_token') {
          showError('Link not found', 'This workout link doesn\u2019t exist or has been removed.');
          return;
        }
        showError('Something went wrong', 'Could not load this workout.');
        return;
      }

      renderWorkout(payload);
    } catch (e) {
      console.error('[share] Fatal error:', e);
      showError('Something went wrong', e.message || 'Could not load this workout.');
    }
  }

  function showError(title, message) {
    app.innerHTML = `
      <div class="error-page">
        <h1>${esc(title)}</h1>
        <p>${esc(message)}</p>
        <div class="cta" style="margin-top:32px">
          <a href="https://ironz.fit">Open IronZ</a>
        </div>
      </div>`;
  }

  function showExpired(data) {
    app.innerHTML = `
      <div class="expired-banner">This share link has expired.</div>
      <div class="cta">
        <a href="https://ironz.fit">Open IronZ</a>
        <div class="sub">Get more workouts in the app</div>
      </div>`;
  }

  function renderWorkout(data) {
    app.innerHTML = `
      ${renderCard(data)}
      <div class="cta">
        <a href="https://ironz.fit?import=${esc(data.share_token || '')}">Save Workout in IronZ</a>
        <div class="sub">Free \u2022 Opens in the app</div>
      </div>`;

    const name = data.session?.session_name || _friendlyTypeLabel(data.session_type_id) || 'Workout';
    document.title = `${name} — IronZ`;
  }

  // Friendly labels for session_type_id values
  const _TYPE_LABELS = {
    threshold: 'Threshold Test', ftp_test: 'FTP Test', tempo: 'Tempo Run',
    tempo_threshold: 'Tempo / Threshold', endurance: 'Endurance Session',
    interval: 'Interval Session', easy: 'Easy Session', easy_recovery: 'Easy / Recovery',
    long_run: 'Long Run', speed: 'Speed Work', speed_work: 'Speed Work',
    strength: 'Strength Session', hiit: 'HIIT Session',
    track_workout: 'Track Workout', hills: 'Hill Repeats',
    running: 'Running Session', cycling: 'Cycling Session',
    swimming: 'Swim Session', general: 'General Workout',
    bike: 'Cycling Session', swim: 'Swim Session', run: 'Running Session',
  };
  function _friendlyTypeLabel(typeId) {
    if (!typeId) return null;
    if (_TYPE_LABELS[typeId]) return _TYPE_LABELS[typeId];
    return typeId.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  const _SPORT_LABELS = {
    run: 'Running', bike: 'Cycling', swim: 'Swimming',
    strength: 'Strength', hybrid: 'Hybrid', running: 'Running',
    cycling: 'Cycling', swimming: 'Swimming',
  };

  function renderCard(data) {
    const session = data.session || {};
    const sessionData = session.data || {};
    const name = session.session_name
      || _friendlyTypeLabel(data.session_type_id)
      || 'Shared Workout';
    const sessionType = session.session_type || data.session_type_id || '';
    const sport = data.sport_id || sessionData.sport || '';
    const sharer = data.sender_name || 'An IronZ user';

    const sportLabel = _SPORT_LABELS[sport] || '';
    const typeLabel = _friendlyTypeLabel(sessionType) || '';

    let html = `<div class="card">`;

    html += `<div class="card-header">
      <h1>${esc(name)}</h1>
      <div class="card-meta">`;
    if (sportLabel) html += `<span class="badge">${esc(sportLabel)}</span>`;
    if (typeLabel && typeLabel !== sportLabel && typeLabel !== name) {
      html += `<span class="badge">${esc(typeLabel)}</span>`;
    }
    if (sessionData.duration_minutes) html += `<span class="badge">${sessionData.duration_minutes} min</span>`;
    html += `</div></div>`;

    html += `<div class="shared-by">Shared by <strong>${esc(sharer)}</strong></div>`;

    if (data.share_note) {
      html += `<div class="notes">\u201c${esc(data.share_note)}\u201d</div>`;
    }

    let exercises = session.exercises || [];
    if (typeof exercises === 'string') {
      try { exercises = JSON.parse(exercises); } catch { exercises = []; }
    }

    if (exercises.length > 0) {
      // Skip the zone-colored structure bar for strength workouts — exercises
      // like "Dumbbell Shoulder Press" don't map to running zones, so the bar
      // would just render as a flat block of the default orange.
      const _isStrengthSport = sport === "strength" || sport === "weightlifting"
        || sessionType === "strength" || sessionType === "weightlifting";
      if (!_isStrengthSport) html += renderSegmentBar(exercises);
      html += renderExercises(exercises);
    } else {
      const structures = {
        track_workout:    ['Warm-up: 15 min easy + strides', 'Main: Repeats at I-pace', 'Cool-down: 10 min easy'],
        tempo_threshold:  ['Warm-up: 15 min easy', 'Main: Cruise intervals at T-pace', 'Cool-down: 10 min easy'],
        speed_work:       ['Warm-up: 15 min easy', 'Main: Short repeats at R-pace', 'Cool-down: 10 min easy'],
        hills:            ['Warm-up: 15 min easy', 'Main: Hill repeats, hard up / easy down', 'Cool-down: 10 min easy'],
        long_run:         ['Sustained aerobic effort at E-pace'],
        endurance:        ['Steady aerobic effort'],
        easy_recovery:    ['Conversational easy effort'],
        threshold:        ['Warm-up: 10 min', 'Test: 20 min all-out', 'Cool-down: 10 min'],
        running:          ['Running session'],
        cycling:          ['Cycling session'],
        swimming:         ['Swim session'],
      };
      const lines = structures[data.session_type_id];
      if (lines) {
        html += `<div class="section"><div class="section-title">Structure</div>`;
        lines.forEach(l => { html += `<div class="exercise-row"><span class="exercise-name">${esc(l)}</span></div>`; });
        html += `</div>`;
      }
    }

    if (session.description) {
      html += `<div class="notes">${esc(session.description)}</div>`;
    }

    html += `</div>`;
    return html;
  }

  function renderSegmentBar(exercises) {
    const ZONE_COLORS = {
      z1: '#4FC3F7', z2: '#4FC3F7', easy: '#4FC3F7', warmup: '#4FC3F7',
      'warm-up': '#4FC3F7', 'warm up': '#4FC3F7', cooldown: '#4FC3F7',
      'cool-down': '#4FC3F7', 'cool down': '#4FC3F7', recovery: '#E0E0E0',
      z3: '#FFB74D', tempo: '#FFB74D', steady: '#FFB74D',
      z4: '#FF7043', threshold: '#FF7043',
      z5: '#E53935', z6: '#E53935', vo2max: '#E53935', vo2: '#E53935',
      sprint: '#E53935', hard: '#E53935',
      rest: '#E0E0E0', rw: '#E0E0E0', walk: '#E0E0E0',
    };

    function getColor(ex) {
      const text = ((ex.name || '') + ' ' + (ex.intensity || '') + ' ' + (ex.zone || '')).toLowerCase();
      for (const [key, color] of Object.entries(ZONE_COLORS)) {
        if (text.includes(key)) return color;
      }
      return '#FFB74D';
    }

    function getDuration(ex) {
      if (ex.duration_minutes) return Number(ex.duration_minutes);
      if (ex.duration) {
        const str = String(ex.duration).toLowerCase();
        const minMatch = str.match(/([\d.]+)\s*min/);
        if (minMatch) return parseFloat(minMatch[1]);
        const secMatch = str.match(/([\d.]+)\s*sec/);
        if (secMatch) return parseFloat(secMatch[1]) / 60;
        const bare = parseFloat(str);
        if (!isNaN(bare)) return bare;
      }
      return 1;
    }

    const segments = [];
    for (const ex of exercises) {
      const repeats = ex.repeats || ex.repeat || 1;
      const dur = getDuration(ex);
      const color = getColor(ex);
      for (let r = 0; r < repeats; r++) {
        segments.push({ flex: dur, color });
      }
    }

    if (segments.length === 0) return '';

    let html = '<div style="display:flex;height:8px;border-radius:4px;overflow:hidden;gap:2px;margin:16px 20px 0;">';
    for (const seg of segments) {
      html += `<div style="flex:${seg.flex};background:${seg.color};border-radius:3px;"></div>`;
    }
    html += '</div>';
    return html;
  }

  function renderExercises(exercises) {
    const _gid = (ex) => ex.supersetGroup || ex.superset_group || ex.superset_id || ex.repeatGroup || null;

    let html = `<div class="section"><div class="section-title">Workout Structure</div>`;
    let i = 0;
    while (i < exercises.length) {
      const gid = _gid(exercises[i]);
      if (gid) {
        const group = [];
        while (i < exercises.length && _gid(exercises[i]) === gid) {
          group.push(exercises[i]);
          i++;
        }
        const sets = group[0].groupSets || group[0].sets || "";
        html += `<div class="superset-group">`;
        html += `<div class="superset-label">${sets ? esc(String(sets)) + '\u00d7 ' : ''}Superset ${esc(gid)}</div>`;
        group.forEach(ex => { html += exerciseRow(ex); });
        html += `</div>`;
      } else {
        html += exerciseRow(exercises[i]);
        i++;
      }
    }
    html += `</div>`;
    return html;
  }

  function exerciseRow(ex) {
    const name = ex.name || ex.exercise || 'Exercise';
    const parts = [];
    if (ex.sets && ex.reps) parts.push(`${ex.sets} \u00d7 ${ex.reps}`);
    else if (ex.sets) parts.push(`${ex.sets} sets`);
    if (ex.duration) parts.push(ex.duration);
    if (ex.weight) parts.push(`@ ${ex.weight}`);
    if (ex.intensity) parts.push(ex.intensity);
    if (ex.details) parts.push(ex.details);
    if (ex.reps && !ex.sets) parts.push(`${ex.reps} reps`);
    const detail = parts.join(' \u00b7 ');
    return `<div class="exercise-row">
      <span class="exercise-name">${esc(name)}</span>
      ${detail ? `<span class="exercise-detail">${esc(detail)}</span>` : ''}
    </div>`;
  }

  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
