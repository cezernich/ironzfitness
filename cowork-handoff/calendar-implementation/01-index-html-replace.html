<!--
  CALENDAR HTML — Replace the existing calendar <section> in index.html
  (lines ~699-714) with this block.

  The day-detail-card section (lines ~720-722) stays as-is; calendar.js
  will populate #day-detail-content dynamically.
-->

<!-- Calendar -->
<section class="card cal-card-wrap" style="position:relative">
  <button class="cal-help-btn" id="cal-help-btn" onclick="toggleCalHelp()" title="Help">?</button>
  <div class="cal-help-tooltip" id="cal-help-tooltip">
    To edit or remove training plans, go to <strong>Training</strong> tab &rarr; <strong>Active Training Inputs</strong>.
  </div>

  <!-- New clean header -->
  <div class="cal-hdr">
    <div class="cal-hdr-l">
      <button class="cal-nb" onclick="calPrev()" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span id="calendar-month-label" class="cal-mo"></span>
      <button class="cal-nb" onclick="calNext()" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
      <button class="cal-nb cal-today-btn" id="cal-this-week-btn" onclick="goToThisWeek()" style="display:none" aria-label="Go to today">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="cal-hdr-r">
      <button class="cal-toggle" id="cal-zoom-btn" onclick="toggleCalendarMode()" title="Toggle view">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>
      <button class="qa-btn" onclick="openQuickEntry(selectedDate)" title="Quick add">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Calendar grid: JS renders either carousel (week) or grid (month) here -->
  <div id="calendar-grid" class="calendar-grid"></div>
  <div id="week-overview-bar"></div>
</section>
