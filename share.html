<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Workout — IronZ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f0f18;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container { max-width: 480px; margin: 0 auto; }

  /* Loading state */
  .loading { text-align: center; padding: 80px 0; }
  .loading .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(168,85,247,0.2);
    border-top-color: #a855f7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error state */
  .error-page { text-align: center; padding: 80px 0; }
  .error-page h1 { font-size: 24px; margin-bottom: 12px; color: #fff; }
  .error-page p { color: #999; font-size: 15px; }

  /* Card */
  .card {
    background: #1a1a2e;
    border-radius: 16px;
    border: 1px solid rgba(168,85,247,0.15);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .card-header {
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .card-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }
  .card-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 13px;
    color: #999;
  }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(168,85,247,0.15);
    color: #c084fc;
  }
  .shared-by {
    padding: 14px 20px;
    font-size: 14px;
    color: #bbb;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .shared-by strong { color: #fff; }

  /* Sections (exercises, segments, etc.) */
  .section {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #a855f7;
    margin-bottom: 10px;
  }
  .exercise-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 14px;
  }
  .exercise-name { color: #e0e0e0; flex: 1; }
  .exercise-detail { color: #999; font-size: 13px; text-align: right; margin-left: 12px; }

  /* Superset grouping */
  .superset-group {
    border-left: 3px solid #a855f7;
    padding-left: 12px;
    margin: 6px 0;
  }
  .superset-label {
    font-size: 11px;
    font-weight: 700;
    color: #a855f7;
    margin-bottom: 4px;
  }

  /* Notes */
  .notes {
    padding: 14px 20px;
    font-size: 13px;
    color: #999;
    font-style: italic;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  /* CTA */
  .cta {
    text-align: center;
    padding: 24px 0;
  }
  .cta a {
    display: inline-block;
    padding: 14px 32px;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    border-radius: 12px;
    text-decoration: none;
    transition: transform 0.15s;
  }
  .cta a:active { transform: scale(0.97); }
  .cta .sub { font-size: 12px; color: #777; margin-top: 8px; }

  /* Expired overlay */
  .expired-banner {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    margin-bottom: 16px;
    color: #f87171;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading-state">
    <div class="spinner"></div>
    <p>Loading workout...</p>
  </div>
</div>

<script>
(function() {
  const SUPABASE_URL = 'https://dagdpdcwqdlibxbitdgr.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhZ2RwZGN3cWRsaWJ4Yml0ZGdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Mjk4NjQsImV4cCI6MjA5MTEwNTg2NH0.vc-fvFgZNEvusGgc3yhCzMRmuKrXUHW5uxHHMx1JV44';

  const app = document.getElementById('app');

  // Extract token from URL path: /share.html -> /w/TOKEN or ?token=TOKEN
  let token = null;
  const pathMatch = window.location.pathname.match(/\/w\/([^\/]+)/);
  if (pathMatch) {
    token = pathMatch[1];
  } else {
    const params = new URLSearchParams(window.location.search);
    token = params.get('token');
  }

  if (!token || !/^[\w-]{6,64}$/.test(token)) {
    showError('Invalid share link', 'This link appears to be malformed.');
    return;
  }

  // Fetch workout data from Supabase directly (REST API)
  fetchWorkout(token);

  async function fetchWorkout(token) {
    try {
      const headers = {
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${SUPABASE_ANON}`
      };

      // Step 1: Get the shared_workouts row (plain select, no join —
      // there's no FK from shared_workouts to profiles in the schema).
      const shareUrl = `${SUPABASE_URL}/rest/v1/shared_workouts?share_token=eq.${encodeURIComponent(token)}&select=*`;
      const shareRes = await fetch(shareUrl, { headers });

      if (!shareRes.ok) {
        showError('Something went wrong', 'Could not load this workout.');
        return;
      }

      const rows = await shareRes.json();
      if (!rows || rows.length === 0 || rows.code) {
        showError('Link not found', 'This workout link doesn\u2019t exist or has been removed.');
        return;
      }

      const share = rows[0];

      // Check revoked
      if (share.revoked_at) {
        showError('Link revoked', 'This share link is no longer available.');
        return;
      }

      // Check expiry
      if (share.expires_at && new Date(share.expires_at) < new Date()) {
        showExpired(share);
        return;
      }

      // Step 2: Look up sender profile name (separate query since no FK join).
      if (share.sender_user_id) {
        try {
          const profileUrl = `${SUPABASE_URL}/rest/v1/profiles?id=eq.${share.sender_user_id}&select=full_name`;
          const profileRes = await fetch(profileUrl, { headers });
          if (profileRes.ok) {
            const profileRows = await profileRes.json();
            if (profileRows && profileRows.length > 0 && profileRows[0].full_name) {
              share._senderName = profileRows[0].full_name;
            }
          }
        } catch (e) { /* non-fatal */ }
      }

      // Step 3: Get the actual training session using variant_id.
      // RLS on training_sessions may block anon reads — handle gracefully.
      let session = {};
      if (share.variant_id) {
        try {
          const sessionUrl = `${SUPABASE_URL}/rest/v1/training_sessions?id=eq.${encodeURIComponent(share.variant_id)}&select=session_name,session_type,description,exercises,data`;
          const sessionRes = await fetch(sessionUrl, { headers });
          if (sessionRes.ok) {
            const sessionRows = await sessionRes.json();
            console.log('[share.html] training_sessions response:', sessionRows);
            if (sessionRows && sessionRows.length > 0) session = sessionRows[0];
          } else {
            console.warn('[share.html] training_sessions query failed:', sessionRes.status);
          }
        } catch (e) { /* non-fatal — we'll fall back to share metadata */ }
      }

      // Merge share + session data for rendering
      const merged = { ...share, session };

      // Best-effort view increment
      fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_share_view`, {
        method: 'POST',
        headers: { ...headers, 'Content-Type': 'application/json' },
        body: JSON.stringify({ token_arg: token })
      }).catch(() => {});

      renderWorkout(merged);
    } catch (e) {
      console.error('[share.html] Fatal error:', e);
      showError('Something went wrong', e.message || 'Could not load this workout.');
    }
  }

  function showError(title, message) {
    app.innerHTML = `
      <div class="error-page">
        <h1>${esc(title)}</h1>
        <p>${esc(message)}</p>
        <div class="cta" style="margin-top:32px">
          <a href="https://ironz.fit">Open IronZ</a>
        </div>
      </div>`;
  }

  function showExpired(data) {
    app.innerHTML = `
      <div class="expired-banner">This share link has expired.</div>
      ${renderCard(data)}
      <div class="cta">
        <a href="https://ironz.fit">Open IronZ</a>
        <div class="sub">Get the full workout in the app</div>
      </div>`;
  }

  function renderWorkout(data) {
    app.innerHTML = `
      ${renderCard(data)}
      <div class="cta">
        <a href="https://ironz.fit?import=${esc(data.share_token || '')}">Save Workout in IronZ</a>
        <div class="sub">Free \u2022 Opens in the app</div>
      </div>`;

    const name = data.session?.session_name || _friendlyTypeLabel(data.session_type_id) || 'Workout';
    document.title = `${name} — IronZ`;
  }

  // Friendly labels for session_type_id values
  const _TYPE_LABELS = {
    threshold: 'Threshold Test', ftp_test: 'FTP Test', tempo: 'Tempo Run',
    tempo_threshold: 'Tempo / Threshold', endurance: 'Endurance Session',
    interval: 'Interval Session', easy: 'Easy Session', easy_recovery: 'Easy / Recovery',
    long_run: 'Long Run', speed: 'Speed Work', speed_work: 'Speed Work',
    strength: 'Strength Session', hiit: 'HIIT Session',
    track_workout: 'Track Workout', hills: 'Hill Repeats',
    running: 'Running Session', cycling: 'Cycling Session',
    swimming: 'Swim Session', general: 'General Workout',
    bike: 'Cycling Session', swim: 'Swim Session', run: 'Running Session',
  };
  function _friendlyTypeLabel(typeId) {
    if (!typeId) return null;
    if (_TYPE_LABELS[typeId]) return _TYPE_LABELS[typeId];
    // Capitalize and clean underscores as last resort
    return typeId.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  // Sport display labels
  const _SPORT_LABELS = {
    run: 'Running', bike: 'Cycling', swim: 'Swimming',
    strength: 'Strength', hybrid: 'Hybrid', running: 'Running',
    cycling: 'Cycling', swimming: 'Swimming',
  };

  function renderCard(data) {
    const session = data.session || {};
    const sessionData = session.data || {};
    const name = session.session_name
      || _friendlyTypeLabel(data.session_type_id)
      || 'Shared Workout';
    const sessionType = session.session_type || data.session_type_id || '';
    const sport = data.sport_id || sessionData.sport || '';
    const sharer = data._senderName || (data.profiles && data.profiles.full_name) || 'An IronZ user';

    const sportLabel = _SPORT_LABELS[sport] || '';
    const typeLabel = _friendlyTypeLabel(sessionType) || '';

    let html = `<div class="card">`;

    // Header — deduplicate badges: if sport and type would show the same thing, only show sport
    html += `<div class="card-header">
      <h1>${esc(name)}</h1>
      <div class="card-meta">`;
    if (sportLabel) html += `<span class="badge">${esc(sportLabel)}</span>`;
    // Only show type badge if it adds information beyond the sport badge
    if (typeLabel && typeLabel !== sportLabel && typeLabel !== name) {
      html += `<span class="badge">${esc(typeLabel)}</span>`;
    }
    if (sessionData.duration_minutes) html += `<span class="badge">${sessionData.duration_minutes} min</span>`;
    html += `</div></div>`;

    // Shared by
    html += `<div class="shared-by">Shared by <strong>${esc(sharer)}</strong></div>`;

    // Share note
    if (data.share_note) {
      html += `<div class="notes">\u201c${esc(data.share_note)}\u201d</div>`;
    }

    // Exercises: try training_sessions.exercises first, then fall back to
    // a generic structure summary from the session_type_id
    let exercises = session.exercises || [];
    if (typeof exercises === 'string') {
      try { exercises = JSON.parse(exercises); } catch { exercises = []; }
    }

    console.log('[share.html] renderCard exercises:', exercises.length, exercises);
    if (exercises.length > 0) {
      html += renderExercises(exercises);
    } else {
      // No training_sessions data — show a generic structure from session_type_id
      const structures = {
        track_workout:    ['Warm-up: 15 min easy + strides', 'Main: Repeats at I-pace', 'Cool-down: 10 min easy'],
        tempo_threshold:  ['Warm-up: 15 min easy', 'Main: Cruise intervals at T-pace', 'Cool-down: 10 min easy'],
        speed_work:       ['Warm-up: 15 min easy', 'Main: Short repeats at R-pace', 'Cool-down: 10 min easy'],
        hills:            ['Warm-up: 15 min easy', 'Main: Hill repeats, hard up / easy down', 'Cool-down: 10 min easy'],
        long_run:         ['Sustained aerobic effort at E-pace'],
        endurance:        ['Steady aerobic effort'],
        easy_recovery:    ['Conversational easy effort'],
        threshold:        ['Warm-up: 10 min', 'Test: 20 min all-out', 'Cool-down: 10 min'],
        running:          ['Running session'],
        cycling:          ['Cycling session'],
        swimming:         ['Swim session'],
      };
      const lines = structures[data.session_type_id];
      if (lines) {
        html += `<div class="section"><div class="section-title">Structure</div>`;
        lines.forEach(l => { html += `<div class="exercise-row"><span class="exercise-name">${esc(l)}</span></div>`; });
        html += `</div>`;
      }
    }

    // Description as notes
    if (session.description) {
      html += `<div class="notes">${esc(session.description)}</div>`;
    }

    html += `</div>`;
    return html;
  }

  function renderExercises(exercises) {
    // Group consecutive exercises by any superset/repeat grouping field
    const _gid = (ex) => ex.supersetGroup || ex.superset_group || ex.superset_id || ex.repeatGroup || null;

    let html = `<div class="section"><div class="section-title">Workout Structure</div>`;
    let i = 0;
    while (i < exercises.length) {
      const gid = _gid(exercises[i]);
      if (gid) {
        const group = [];
        while (i < exercises.length && _gid(exercises[i]) === gid) {
          group.push(exercises[i]);
          i++;
        }
        const sets = group[0].groupSets || group[0].sets || "";
        html += `<div class="superset-group">`;
        html += `<div class="superset-label">${sets ? esc(String(sets)) + '\u00d7 ' : ''}Superset ${esc(gid)}</div>`;
        group.forEach(ex => { html += exerciseRow(ex); });
        html += `</div>`;
      } else {
        html += exerciseRow(exercises[i]);
        i++;
      }
    }
    html += `</div>`;
    return html;
  }

  function exerciseRow(ex) {
    const name = ex.name || ex.exercise || 'Exercise';
    const parts = [];
    if (ex.sets && ex.reps) parts.push(`${ex.sets} \u00d7 ${ex.reps}`);
    else if (ex.sets) parts.push(`${ex.sets} sets`);
    if (ex.duration) parts.push(ex.duration);
    if (ex.weight) parts.push(`@ ${ex.weight}`);
    if (ex.intensity) parts.push(ex.intensity);
    if (ex.details) parts.push(ex.details);
    if (ex.reps && !ex.sets) parts.push(`${ex.reps} reps`);
    const detail = parts.join(' \u00b7 ');
    return `<div class="exercise-row">
      <span class="exercise-name">${esc(name)}</span>
      ${detail ? `<span class="exercise-detail">${esc(detail)}</span>` : ''}
    </div>`;
  }

  function renderSegments(segments) {
    let html = `<div class="section"><div class="section-title">Segments</div>`;
    segments.forEach(seg => {
      const name = seg.name || seg.type || 'Segment';
      let detail = '';
      if (seg.distance) detail = seg.distance;
      if (seg.duration) detail = detail ? `${detail} / ${seg.duration}` : seg.duration;
      if (seg.pace) detail += ` @ ${seg.pace}`;
      html += `<div class="exercise-row">
        <span class="exercise-name">${esc(name)}</span>
        <span class="exercise-detail">${esc(detail)}</span>
      </div>`;
    });
    html += `</div>`;
    return html;
  }

  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
